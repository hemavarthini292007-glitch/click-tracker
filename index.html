<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Tracker</title>
<style>
body {
font-family: Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
background-color: #f0f0f0;
}
.container {
text-align: center;
background: white;
padding: 40px;
border-radius: 10px;
box-shadow: 0 0 20px rgba(0,0,0,0.1);
}
input {
padding: 10px;
width: 100%;
margin: 10px 0;
border: 1px solid #ccc;
border-radius: 5px;
font-size: 16px;
}
button {
background-color: #2ea44f;
color: white;
border: none;
padding: 15px 40px;
font-size: 18px;
border-radius: 6px;
cursor: pointer;
margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
<h1>Welcome</h1>
<p>Please enter your details</p>
<form action="https://formspree.io/f/xwvarjvp"
method="POST">
<input type="text" name="name"
placeholder="Your Name" required />
<input type="email" name="email"
placeholder="Your Email ID" required />
<input type="hidden" name="_subject"
value="Someone Clicked Your Button!" />
<button type="submit">Click Here</button>
</form>
</div>
</body>
</html>
